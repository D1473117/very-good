{% extends 'base.html' %}

{% block title %}登入系統 - 隨便吃什麼都好{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: calc(100vh - 200px); padding: 1rem;">
    <div class="glass-card accent-header" style="width: 100%; max-width: 450px;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h2><i class="bi bi-box-arrow-in-right" style="color: #FF416C; margin-right: 0.5rem;"></i>會員登入</h2>
            <p style="color: var(--text-secondary); margin-bottom: 0;">登入以使用個人化收藏、歷史紀錄與條件篩選設定！</p>
        </div>
        
        <form action="{{ url_for('auth.login') }}" method="POST">
            <div class="form-group">
                <label class="form-label" for="username">使用者名稱</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="請輸入使用者名稱" required autocomplete="off">
            </div>
            
            <div class="form-group">
                <label class="form-label" for="password">密碼</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="請輸入密碼" required>
            </div>
            
            <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem;">
                <input type="checkbox" id="remember" name="remember" style="accent-color: #FF416C; width: 16px; height: 16px; cursor: pointer;">
                <label for="remember" style="font-size: 0.9rem; color: var(--text-secondary); cursor: pointer; user-select: none;">記住我</label>
            </div>
            
            <button type="submit" class="spin-btn" style="width: 100%; padding: 0.8rem; font-size: 1.1rem; border-radius: 12px; justify-content: center;">
                立即登入
            </button>
        </form>
        
        <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-secondary);">
            還沒有帳號嗎？
            <a href="{{ url_for('auth.register') }}" style="color: #FF416C; text-decoration: none; font-weight: 600; transition: var(--transition-smooth);">
                免費註冊
            </a>
        </div>
    </div>
</div>
{% endblock %}
