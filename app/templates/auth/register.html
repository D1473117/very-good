{% extends 'base.html' %}

{% block title %}註冊新帳號 - 隨便吃什麼都好{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: calc(100vh - 200px); padding: 1rem;">
    <div class="glass-card accent-header" style="width: 100%; max-width: 450px;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h2><i class="bi bi-person-plus-fill" style="color: #FF416C; margin-right: 0.5rem;"></i>註冊帳號</h2>
            <p style="color: var(--text-secondary); margin-bottom: 0;">加入隨便吃什麼都好，開啟美味的探索旅程！</p>
        </div>
        
        <form action="{{ url_for('auth.register') }}" method="POST">
            <div class="form-group">
                <label class="form-label" for="username">使用者名稱</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="請輸入使用者名稱" required autocomplete="off">
            </div>
            
            <div class="form-group">
                <label class="form-label" for="password">密碼</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="請輸入密碼 (至少 6 個字元)" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="confirm_password">確認密碼</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control" placeholder="請再次輸入密碼" required>
            </div>
            
            <button type="submit" class="spin-btn" style="width: 100%; padding: 0.8rem; font-size: 1.1rem; border-radius: 12px; margin-top: 1.5rem; justify-content: center;">
                註冊並自動登入
            </button>
        </form>
        
        <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-secondary);">
            已經有帳號了嗎？
            <a href="{{ url_for('auth.login') }}" style="color: #FF416C; text-decoration: none; font-weight: 600; transition: var(--transition-smooth);">
                立即登入
            </a>
        </div>
    </div>
</div>
{% endblock %}
