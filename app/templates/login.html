{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center w-100">
    <div class="col-md-6 col-lg-4">
        <div class="glass-card p-5 text-center">
            <div class="login-header mb-4">
                <div class="login-logo-circle mb-3 mx-auto">
                    <i class="fa-solid fa-lock text-primary fs-3"></i>
                </div>
                <h2 class="fw-bold text-dark mb-1">會員登入</h2>
                <p class="text-muted small">登入以享用個人收藏與評分功能</p>
            </div>
            
            <form action="/login" method="POST" class="text-start">
                <div class="mb-3">
                    <label for="username" class="form-label small fw-bold text-muted">使用者帳號</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0 rounded-start-pill text-muted px-3">
                            <i class="fa-solid fa-user"></i>
                        </span>
                        <input type="text" class="form-control border-start-0 rounded-end-pill py-2 shadow-none" id="username" name="username" placeholder="請輸入帳號" required autocomplete="username">
                    </div>
                </div>
                
                <div class="mb-4">
                    <label for="password" class="form-label small fw-bold text-muted">密碼</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0 rounded-start-pill text-muted px-3">
                            <i class="fa-solid fa-key"></i>
                        </span>
                        <input type="password" class="form-control border-start-0 rounded-end-pill py-2 shadow-none" id="password" name="password" placeholder="請輸入密碼" required autocomplete="current-password">
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 rounded-pill py-2.5 fw-bold shadow-sm mb-3">
                    <i class="fa-solid fa-right-to-bracket me-1"></i> 立即登入
                </button>
            </form>
            
            <div class="login-footer mt-4">
                <span class="text-muted small">還沒有帳號嗎？ 
                    <a href="/register" class="fw-bold text-primary text-decoration-none">立即免費註冊</a>
                </span>
            </div>
        </div>
    </div>
</div>
{% endblock %}
