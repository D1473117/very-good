<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>隨便吃什麼都好 - 餐廳篩選器</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body>
    <div class="container min-vh-100 d-flex flex-column justify-content-center align-items-center py-5">
        
        <div class="glass-card p-4 p-md-5 w-100" style="max-width: 500px;">
            <h2 class="text-center mb-4 text-white fw-bold">決定今晚吃什麼</h2>
            
            <form id="filterForm">
                <!-- 距離滑桿 -->
                <div class="mb-4 text-white">
                    <label for="distanceRange" class="form-label d-flex justify-content-between">
                        <span>距離半徑</span>
                        <span id="distanceVal">3 km</span>
                    </label>
                    <input type="range" class="form-range" id="distanceRange" min="1" max="10" step="1" value="3">
                </div>

                <!-- 價格按鈕 -->
                <div class="mb-4 text-white">
                    <label class="form-label">價格區間</label>
                    <div class="d-flex gap-2 justify-content-between">
                        <input type="checkbox" class="btn-check price-btn" id="price1" value="1" autocomplete="off" checked>
                        <label class="btn btn-outline-light flex-fill rounded-pill" for="price1">$ 便宜</label>

                        <input type="checkbox" class="btn-check price-btn" id="price2" value="2" autocomplete="off" checked>
                        <label class="btn btn-outline-light flex-fill rounded-pill" for="price2">$$ 適中</label>

                        <input type="checkbox" class="btn-check price-btn" id="price3" value="3" autocomplete="off">
                        <label class="btn btn-outline-light flex-fill rounded-pill" for="price3">$$$ 昂貴</label>
                        
                        <input type="checkbox" class="btn-check price-btn" id="price4" value="4" autocomplete="off">
                        <label class="btn btn-outline-light flex-fill rounded-pill" for="price4">$$$$ 奢華</label>
                    </div>
                </div>

                <!-- 料理類型 Chips -->
                <div class="mb-4 text-white">
                    <label class="form-label">料理類型 (可複選，不選代表全部)</label>
                    <div class="d-flex flex-wrap gap-2" id="cuisineTypes">
                        <span class="badge rounded-pill bg-white text-dark cuisine-chip px-3 py-2 cursor-pointer" data-val="日式">日式</span>
                        <span class="badge rounded-pill bg-white text-dark cuisine-chip px-3 py-2 cursor-pointer" data-val="台式">台式</span>
                        <span class="badge rounded-pill bg-white text-dark cuisine-chip px-3 py-2 cursor-pointer" data-val="火鍋">火鍋</span>
                        <span class="badge rounded-pill bg-white text-dark cuisine-chip px-3 py-2 cursor-pointer" data-val="速食">速食</span>
                        <span class="badge rounded-pill bg-white text-dark cuisine-chip px-3 py-2 cursor-pointer" data-val="咖啡廳">咖啡廳</span>
                        <span class="badge rounded-pill bg-white text-dark cuisine-chip px-3 py-2 cursor-pointer" data-val="甜點">甜點</span>
                    </div>
                </div>

                <!-- 隨機抽選按鈕 -->
                <button type="submit" class="btn btn-primary w-100 py-3 rounded-pill fw-bold fs-5 mt-3 apply-btn border-0 shadow-lg" id="randomBtn">
                    🎯 套用並隨機抽選
                </button>
            </form>
            
            <!-- 結果顯示區 -->
            <div id="resultBox" class="mt-4 text-center d-none">
                <hr class="text-white">
                <div class="roulette-box p-3 rounded-4 bg-white bg-opacity-25 mt-3 text-white shadow-sm border border-white border-opacity-25">
                    <h5 class="text-white-50 mb-1">今晚就決定是你了！</h5>
                    <h2 class="fw-bold mb-2" id="resultName" style="color: #0f172a;">尋找中...</h2>
                    <p class="mb-1 small"><span class="badge bg-secondary me-2" id="resultType"></span> <span id="resultRating"></span> ⭐️</p>
                    <p class="mb-0 small text-white-50"><i class="bi bi-geo-alt"></i> <span id="resultAddress"></span> (<span id="resultDist"></span> m)</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 距離滑桿聯動
        const distanceRange = document.getElementById('distanceRange');
        const distanceVal = document.getElementById('distanceVal');
        distanceRange.addEventListener('input', (e) => {
            distanceVal.textContent = e.target.value + ' km';
        });

        // 料理類型選擇邏輯
        let selectedCuisines = new Set();
        document.querySelectorAll('.cuisine-chip').forEach(chip => {
            chip.style.cursor = 'pointer';
            chip.addEventListener('click', function() {
                const val = this.dataset.val;
                if(selectedCuisines.has(val)){
                    selectedCuisines.delete(val);
                    this.classList.replace('bg-primary', 'bg-white');
                    this.classList.replace('text-white', 'text-dark');
                } else {
                    selectedCuisines.add(val);
                    this.classList.replace('bg-white', 'bg-primary');
                    this.classList.replace('text-dark', 'text-white');
                }
            });
        });

        // 表單送出與動畫效果
        document.getElementById('filterForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('randomBtn');
            const resultBox = document.getElementById('resultBox');
            const resultName = document.getElementById('resultName');
            
            // 收集價格條件
            const priceLevels = Array.from(document.querySelectorAll('.price-btn:checked')).map(cb => parseInt(cb.value));
            
            if(priceLevels.length === 0) {
                alert('請至少選擇一個價格區間！');
                return;
            }

            const reqData = {
                distance: parseInt(distanceRange.value) * 1000,
                price_level: priceLevels,
                cuisines: Array.from(selectedCuisines)
            };

            // UI 狀態：抽選中
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> 命運轉盤轉動中...';
            resultBox.classList.remove('d-none');
            resultName.classList.remove('text-danger');
            resultName.style.color = '#0f172a';
            
            // 簡單的轉盤文字動畫效果
            let ticks = 0;
            const tempNames = ['吃泡麵吧', '再想一下...', '麥當勞?', '選擇困難症發作', '就決定是你了!'];
            const interval = setInterval(() => {
                resultName.textContent = tempNames[ticks % tempNames.length];
                ticks++;
            }, 100);

            try {
                const res = await fetch('/api/recommend', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(reqData)
                });
                const data = await res.json();
                
                clearInterval(interval);
                
                if(res.ok) {
                    resultName.textContent = data.name;
                    document.getElementById('resultType').textContent = data.type;
                    document.getElementById('resultRating').textContent = data.rating;
                    document.getElementById('resultAddress').textContent = data.address;
                    document.getElementById('resultDist').textContent = data.distance;
                } else {
                    resultName.textContent = data.error || '發生錯誤';
                    resultName.classList.replace('text-warning', 'text-danger');
                    document.getElementById('resultType').textContent = '';
                    document.getElementById('resultRating').textContent = '';
                    document.getElementById('resultAddress').textContent = '';
                    document.getElementById('resultDist').textContent = '';
                }
            } catch (err) {
                clearInterval(interval);
                resultName.textContent = '網路錯誤，請稍後再試';
                resultName.classList.replace('text-warning', 'text-danger');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '🎯 重新抽選';
            }
        });
    </script>
</body>
</html>
